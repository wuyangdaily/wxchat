name: Docker Image CI

# 触发条件：
# 1. 手动触发 workflow_dispatch
# 2. 自动触发 create（新分支或新标签）
on:
  workflow_dispatch:  # 手动触发
  create:             # 自动触发：新分支或标签

jobs:
  build-push:
    runs-on: ubuntu-latest
    environment: Docker

    steps:
    # 1️⃣ 拉取仓库代码
    - uses: actions/checkout@v3

    # 2️⃣ 登录 Docker Hub（使用 Secrets）
    - name: Docker Login
      run: |
        echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

    # 3️⃣ 构建并推送 Docker 镜像
    - name: Build and Push the Docker image
      run: |
        # 自动设置镜像标签：如果是标签创建，则用标签名，否则用 latest
        if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
          IMAGE_TAG="${GITHUB_REF##*/}"
        else
          IMAGE_TAG="latest"
        fi

        echo "Building and pushing image with tag: $IMAGE_TAG"

        # 使用 Secrets 的用户名构建和推送
        docker build -t ${{ secrets.DOCKER_USERNAME }}/wxchat:$IMAGE_TAG .
        docker push ${{ secrets.DOCKER_USERNAME }}/wxchat:$IMAGE_TAG

    # 4️⃣ 登出 Docker Hub
    - name: Docker Logout
      run: docker logout
